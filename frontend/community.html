<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community | FeedNet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "sans-serif"] },
          colors: {
            ocean: { 50: "#f5fbff", 100: "#e6f6ff", 300: "#91d8ff", 600: "#1588d6", 800: "#15557d", 950: "#102f48" },
            mint: { 100: "#e9fbf4", 500: "#22b887", 700: "#13765b" },
            coral: "#ff7a59",
            honey: "#f4b740"
          },
          boxShadow: { soft: "0 24px 70px rgba(21, 136, 214, 0.16)" }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body class="bg-ocean-50 font-sans text-ocean-950 antialiased">
  <div class="pointer-events-none fixed inset-0 -z-10 bg-[radial-gradient(circle_at_10%_0%,rgba(145,216,255,.35),transparent_34%),linear-gradient(180deg,#f5fbff_0%,#ffffff_44%,#f7fcff_100%)]"></div>

  <header class="sticky top-0 z-40 mx-auto flex w-[min(1180px,calc(100%_-_32px))] items-center justify-between gap-4 py-4 backdrop-blur-xl max-md:static max-md:flex-col">
    <a href="index.html" class="flex items-center gap-3 font-black text-ocean-950">
      <span class="grid h-11 w-11 place-items-center rounded-lg bg-gradient-to-br from-ocean-600 to-mint-500 text-sm font-black text-white shadow-lg shadow-ocean-600/20">FN</span>
      <span>FeedNet</span>
    </a>
    <nav class="role-nav" data-role-nav></nav>
  </header>

  <main class="mx-auto grid min-h-[calc(100vh_-_96px)] w-[min(1180px,calc(100%_-_32px))] grid-cols-[.72fr_1.28fr] gap-6 py-8 max-lg:grid-cols-1">
    <aside class="animate-rise rounded-lg border border-ocean-100 bg-white/90 p-6 shadow-soft">
      <p class="mb-3 text-xs font-black uppercase tracking-[.14em] text-mint-700">Shared community</p>
      <h1 class="text-4xl font-black leading-tight text-ocean-950 max-sm:text-3xl">Volunteer and restaurant coordination chat.</h1>
      <p class="mt-3 leading-7 text-slate-600">Use this common space to confirm pickups, ask route questions, report packaging details, and keep handoffs clear.</p>
      <div class="mt-6 grid gap-3">
        <article class="rounded-lg bg-ocean-100 p-4">
          <span class="text-sm font-black text-slate-500">Access</span>
          <strong class="mt-2 block text-xl font-black text-ocean-950">Volunteers and restaurants</strong>
        </article>
        <article class="rounded-lg bg-mint-100 p-4">
          <span class="text-sm font-black text-slate-500">Best use</span>
          <strong class="mt-2 block text-xl font-black text-ocean-950">Live pickup coordination</strong>
        </article>
      </div>
    </aside>

    <section class="animate-float-in grid min-h-[620px] grid-rows-[auto_1fr_auto] overflow-hidden rounded-lg border border-ocean-100 bg-white/90 shadow-soft">
      <div class="border-b border-ocean-100 p-5">
        <p class="text-xs font-black uppercase tracking-[.14em] text-mint-700">Mini chatbot</p>
        <h2 class="mt-2 text-3xl font-black text-ocean-950">Community room</h2>
      </div>

      <div class="chat-log" data-chat-log aria-live="polite"></div>

      <form class="grid grid-cols-[1fr_auto] gap-3 border-t border-ocean-100 bg-ocean-50 p-4 max-sm:grid-cols-1" data-chat-form>
        <label class="sr-only" for="community-message">Message</label>
        <textarea class="field min-h-16 py-3" id="community-message" name="message" placeholder="Type a pickup note, route question, or restaurant update" required></textarea>
        <button class="submit-button self-end" type="submit">Send</button>
      </form>
    </section>
  </main>
</body>
</html>
