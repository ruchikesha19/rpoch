<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | FeedNet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "sans-serif"] },
          colors: {
            ocean: { 50: "#f5fbff", 100: "#e6f6ff", 300: "#91d8ff", 600: "#1588d6", 800: "#15557d", 950: "#102f48" },
            mint: { 100: "#e9fbf4", 500: "#22b887", 700: "#13765b" },
            coral: "#ff7a59",
            honey: "#f4b740"
          },
          boxShadow: { soft: "0 24px 70px rgba(21, 136, 214, 0.16)" }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body class="bg-ocean-50 font-sans text-ocean-950 antialiased">
  <div class="pointer-events-none fixed inset-0 -z-10 bg-[radial-gradient(circle_at_10%_0%,rgba(145,216,255,.35),transparent_34%),linear-gradient(180deg,#f5fbff_0%,#ffffff_44%,#f7fcff_100%)]"></div>

  <header class="sticky top-0 z-40 mx-auto flex w-[min(1180px,calc(100%_-_32px))] items-center justify-between gap-4 py-4 backdrop-blur-xl max-lg:static max-lg:flex-col">
    <a href="index.html" class="flex items-center gap-3 font-black text-ocean-950">
      <span class="grid h-11 w-11 place-items-center rounded-lg bg-gradient-to-br from-ocean-600 to-mint-500 text-sm font-black text-white shadow-lg shadow-ocean-600/20">FN</span>
      <span>FeedNet</span>
    </a>
    <nav class="grid grid-cols-2 rounded-lg border border-ocean-100 bg-white/80 p-1 text-sm font-extrabold text-slate-500 shadow-sm max-md:w-full">
      <a class="rounded-md bg-ocean-100 px-3 py-2.5 text-center text-ocean-950" href="login.html">Login</a>
      <a class="rounded-md bg-gradient-to-r from-ocean-600 to-mint-500 px-3 py-2.5 text-center text-white" href="register.html">Register</a>
    </nav>
  </header>

  <main class="mx-auto grid min-h-[calc(100vh_-_96px)] w-[min(980px,calc(100%_-_32px))] grid-cols-[.9fr_1.1fr] items-start gap-6 py-8 max-lg:grid-cols-1">
    <section class="animate-rise rounded-lg border border-ocean-100 bg-white/90 p-6 shadow-soft">
      <p class="mb-3 text-xs font-black uppercase tracking-[.14em] text-mint-700">Welcome back</p>
      <h1 class="text-4xl font-black leading-tight text-ocean-950 max-sm:text-3xl">Login and continue from the right dashboard.</h1>
      <p class="mt-3 leading-7 text-slate-600">Choose your role, enter your details, and the prototype will route you to the relevant page.</p>
      <div class="mt-6 rounded-lg bg-ocean-100 p-4 text-sm font-bold leading-6 text-slate-600">
        New here? <a class="font-black text-ocean-800" href="register.html">Create an account</a>.
      </div>
    </section>

    <section class="animate-float-in rounded-lg border border-ocean-100 bg-white/90 p-6 shadow-soft">
      <form class="grid gap-4" data-login-form>
        <label class="grid gap-2 text-sm font-black text-ocean-950">Role
          <select class="field" name="role" required>
            <option value="volunteer">Volunteer</option>
            <option value="restaurant">Restaurant</option>
            <option value="ngo">NGO</option>
          </select>
        </label>
        <label class="grid gap-2 text-sm font-black text-ocean-950">Email, mobile, or ID<input class="field" name="identity" type="text" placeholder="aarav@example.com" required></label>
        <label class="grid gap-2 text-sm font-black text-ocean-950">Password<input class="field" name="password" type="password" placeholder="Enter password" required></label>
        <button class="submit-button" type="submit">Login</button>
      </form>
    </section>
  </main>
</body>
</html>
