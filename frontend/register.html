<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | FeedNet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "sans-serif"] },
          colors: {
            ocean: { 50: "#f5fbff", 100: "#e6f6ff", 300: "#91d8ff", 600: "#1588d6", 800: "#15557d", 950: "#102f48" },
            mint: { 100: "#e9fbf4", 500: "#22b887", 700: "#13765b" },
            coral: "#ff7a59",
            honey: "#f4b740"
          },
          boxShadow: { soft: "0 24px 70px rgba(21, 136, 214, 0.16)" }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body class="bg-ocean-50 font-sans text-ocean-950 antialiased">
  <div class="pointer-events-none fixed inset-0 -z-10 bg-[radial-gradient(circle_at_10%_0%,rgba(145,216,255,.35),transparent_34%),linear-gradient(180deg,#f5fbff_0%,#ffffff_44%,#f7fcff_100%)]"></div>

  <header class="sticky top-0 z-40 mx-auto flex w-[min(1180px,calc(100%_-_32px))] items-center justify-between gap-4 py-4 backdrop-blur-xl max-lg:static max-lg:flex-col">
    <a href="index.html" class="flex items-center gap-3 font-black text-ocean-950">
      <span class="grid h-11 w-11 place-items-center rounded-lg bg-gradient-to-br from-ocean-600 to-mint-500 text-sm font-black text-white shadow-lg shadow-ocean-600/20">FN</span>
      <span>FeedNet</span>
    </a>
    <nav class="grid grid-cols-2 rounded-lg border border-ocean-100 bg-white/80 p-1 text-sm font-extrabold text-slate-500 shadow-sm max-md:w-full">
      <a class="rounded-md px-3 py-2.5 text-center transition hover:bg-ocean-100 hover:text-ocean-950" href="login.html">Login</a>
      <a class="rounded-md bg-gradient-to-r from-ocean-600 to-mint-500 px-3 py-2.5 text-center text-white" href="register.html">Register</a>
    </nav>
  </header>

  <main class="mx-auto grid min-h-[calc(100vh_-_96px)] w-[min(1080px,calc(100%_-_32px))] grid-cols-[.8fr_1.2fr] items-start gap-6 py-8 max-lg:grid-cols-1">
    <section class="animate-rise rounded-lg border border-ocean-100 bg-white/90 p-6 shadow-soft">
      <p class="mb-3 text-xs font-black uppercase tracking-[.14em] text-mint-700">Create account</p>
      <h1 class="text-4xl font-black leading-tight text-ocean-950 max-sm:text-3xl">Choose your role and register once.</h1>
      <p class="mt-3 leading-7 text-slate-600">Volunteer, restaurant, and NGO registrations live here so dashboard pages stay focused and easy to use.</p>
      <div class="mt-6 rounded-lg bg-ocean-100 p-4 text-sm font-bold leading-6 text-slate-600">
        Already have an account? <a class="font-black text-ocean-800" href="login.html">Login here</a>.
      </div>
    </section>

    <section class="animate-float-in rounded-lg border border-ocean-100 bg-white/90 p-6 shadow-soft">
      <div class="grid grid-cols-3 gap-1 rounded-lg bg-ocean-100 p-1" role="tablist" aria-label="Registration role">
        <button class="tab-button active rounded-md px-4 py-3 font-black text-ocean-950" data-tab-target="volunteer-register" type="button">Volunteer</button>
        <button class="tab-button rounded-md px-4 py-3 font-black text-slate-500" data-tab-target="restaurant-register" type="button">Restaurant</button>
        <button class="tab-button rounded-md px-4 py-3 font-black text-slate-500" data-tab-target="ngo-register" type="button">NGO</button>
      </div>

      <form class="tab-panel active mt-5 grid gap-4" id="volunteer-register" data-auth-form data-role="volunteer">
        <label class="grid gap-2 text-sm font-black text-ocean-950">Name<input class="field" name="name" type="text" placeholder="Aarav Sharma" required></label>
        <label class="grid gap-2 text-sm font-black text-ocean-950">Mobile number<input class="field" name="mobile" type="tel" placeholder="+91 98765 43210" required></label>
        <label class="grid gap-2 text-sm font-black text-ocean-950">Aadhar card number<input class="field" name="aadhar" type="text" placeholder="1234 5678 9012" maxlength="14" required></label>
        <label class="grid gap-2 text-sm font-black text-ocean-950">Email<input class="field" name="email" type="email" placeholder="aarav@example.com" required></label>
        <label class="grid gap-2 text-sm font-black text-ocean-950">Profile picture<input class="field file:mr-4 file:rounded-md file:border-0 file:bg-ocean-100 file:px-3 file:py-2 file:font-black file:text-ocean-800" name="profile" type="file" accept="image/*"></label>
        <label class="flex items-start gap-3 text-sm font-bold text-slate-600"><input class="mt-1 h-5 w-5 accent-mint-500" type="checkbox" required><span>I confirm that I am over 18 years old.</span></label>
        <button class="submit-button" type="submit">Create volunteer account</button>
      </form>

      <form class="tab-panel mt-5 grid gap-4" id="restaurant-register" data-auth-form data-role="restaurant">
        <label class="grid gap-2 text-sm font-black text-ocean-950">Hotel name<input class="field" name="hotel" type="text" placeholder="The Blue Plate" required></label>
        <label class="grid gap-2 text-sm font-black text-ocean-950">Mobile number<input class="field" name="mobile" type="tel" placeholder="+91 98765 43210" required></label>
        <label class="grid gap-2 text-sm font-black text-ocean-950">FSSAI ID<input class="field" name="fssai" type="text" placeholder="FSSAI-12345678901234" required></label>
        <label class="grid gap-2 text-sm font-black text-ocean-950">Email<input class="field" name="email" type="email" placeholder="manager@hotel.com" required></label>
        <label class="grid gap-2 text-sm font-black text-ocean-950">Location<input class="field" name="location" type="text" placeholder="Connaught Place, New Delhi" required></label>
        <button class="submit-button" type="submit">Create restaurant account</button>
      </form>

      <form class="tab-panel mt-5 grid gap-4" id="ngo-register" data-auth-form data-role="ngo">
        <label class="grid gap-2 text-sm font-black text-ocean-950">NGO name<input class="field" name="ngo" type="text" placeholder="New Grace NGO" required></label>
        <label class="grid gap-2 text-sm font-black text-ocean-950">Contact person<input class="field" name="contact" type="text" placeholder="Priya Mehta" required></label>
        <label class="grid gap-2 text-sm font-black text-ocean-950">Mobile number<input class="field" name="mobile" type="tel" placeholder="+91 98765 43210" required></label>
        <label class="grid gap-2 text-sm font-black text-ocean-950">Email<input class="field" name="email" type="email" placeholder="team@ngo.org" required></label>
        <label class="grid gap-2 text-sm font-black text-ocean-950">Service area<input class="field" name="area" type="text" placeholder="Civil Lines, New Delhi" required></label>
        <button class="submit-button" type="submit">Create NGO account</button>
      </form>
    </section>
  </main>
</body>
</html>
